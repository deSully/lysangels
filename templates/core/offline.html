{% extends "base.html" %}
{% load static %}

{% block title %}Hors ligne — LysAngels{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20">
  <div class="text-center max-w-md">

    <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-terra/10 flex items-center justify-center">
      <svg class="w-10 h-10 text-terra" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
        <line x1="12" y1="11" x2="12" y2="16" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="18" r="0.5" fill="currentColor" stroke-width="1.5"/>
      </svg>
    </div>

    <h1 class="font-display text-2xl font-semibold text-dark mb-3">Vous êtes hors ligne</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
      Cette page n'est pas disponible sans connexion internet.<br>
      Les pages déjà visitées récemment sont accessibles.
    </p>

    <button onclick="window.location.reload()"
      class="inline-flex items-center gap-2 px-6 py-3 bg-terra text-white rounded-lg font-medium hover:bg-terra/90 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Réessayer
    </button>

    <p class="mt-6">
      <a href="/" class="text-terra text-sm hover:underline">← Retour à l'accueil</a>
    </p>

  </div>
</div>
{% endblock %}
