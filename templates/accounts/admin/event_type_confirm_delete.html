{% extends 'accounts/admin/base_admin.html' %}
{% block title %}Supprimer {{ event_type.name }} — Admin{% endblock %}
{% block admin_content %}
<div class="a-page-hd">
  <h1 class="a-page-title">Supprimer un type d'événement</h1>
</div>
<div class="a-card" style="max-width:420px;">
  <div class="a-card-body">
    <p style="font-size:.825rem; color:var(--night); margin-bottom:1.5rem; line-height:1.65;">
      Supprimer <strong>{{ event_type.name }}</strong> ? Cette action est irréversible.
    </p>
    <div style="display:flex; gap:.625rem;">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="a-btn a-btn-danger">Supprimer définitivement</button>
      </form>
      <a href="{% url 'accounts:admin_event_type_list' %}" class="a-btn a-btn-ghost">Annuler</a>
    </div>
  </div>
</div>
{% endblock %}
