{% extends 'accounts/admin/base_admin.html' %}
{% block title %}Supprimer {{ event_type.name }} - Admin{% endblock %}
{% block admin_content %}
<div class="mb-6">
    <h1 class="text-xl font-semibold text-gray-900">Supprimer un type d'événement</h1>
</div>
<div class="bg-white border border-gray-200 rounded-lg p-6 max-w-lg">
    <p class="text-sm text-gray-700 mb-6">
        Supprimer <strong>{{ event_type.name }}</strong> ? Cette action est irréversible.
    </p>
    <div class="flex gap-3">
        <form method="post">
            {% csrf_token %}
            <button type="submit"
                    class="bg-red-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-red-700 transition">
                Supprimer définitivement
            </button>
        </form>
        <a href="{% url 'accounts:admin_event_type_list' %}"
           class="border border-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm hover:bg-gray-50">Annuler</a>
    </div>
</div>
{% endblock %}
