services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - media:/app/media
    command: python manage.py process_tasks

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static:/srv/static:ro
      - media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  static:
  media:
  caddy_data:
  caddy_config:
